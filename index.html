<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kamelenrace · Pubquiz met een twist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Outfit:wght@300;400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --sand-50:  #FBF1E4;
    --sand-100: #F5E5CC;
    --sand-200: #ECD3A6;
    --sand-300: #DDB97A;
    --sand-400: #C99A4F;
    --terracotta: #C44536;
    --terracotta-dark: #97312A;
    --burnt-orange: #D2691E;
    --teal-deep: #0F4C5C;
    --teal: #1B6F84;
    --gold: #FFB627;
    --gold-soft: #FFD66B;
    --pink: #F4538A;
    --green: #7FB069;
    --ink: #2D1B0E;
    --ink-soft: #5C4632;
    --cream: #FFF9EE;
    --shadow: 0 8px 30px rgba(45, 27, 14, 0.12);
    --shadow-lg: 0 20px 60px rgba(45, 27, 14, 0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Outfit', system-ui, sans-serif;
    color: var(--ink);
    background: var(--sand-50);
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at top left, rgba(255,182,39,0.15), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(196,69,54,0.12), transparent 50%),
      linear-gradient(180deg, #FBF1E4 0%, #F5E5CC 100%);
    min-height: 100vh;
  }

  /* Subtle noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.42  0 0 0 0 0.27  0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Typography */
  h1, h2, h3, .display {
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.0;
  }

  .display-xl {
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 800;
    font-size: clamp(48px, 7vw, 96px);
    letter-spacing: -0.04em;
    line-height: 0.92;
  }

  .handwritten {
    font-family: 'Caveat', cursive;
    font-weight: 700;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 28px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 16px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
    color: inherit;
  }

  .btn-primary {
    background: var(--terracotta);
    color: var(--cream);
    box-shadow: 0 4px 0 var(--terracotta-dark), var(--shadow);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--terracotta-dark), var(--shadow-lg); }
  .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--terracotta-dark); }

  .btn-secondary {
    background: var(--cream);
    color: var(--ink);
    box-shadow: 0 4px 0 var(--sand-200), var(--shadow);
    border: 2px solid var(--sand-200);
  }
  .btn-secondary:hover { transform: translateY(-2px); }
  .btn-secondary:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--sand-200); }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 2px dashed var(--sand-300);
  }
  .btn-ghost:hover { background: var(--cream); color: var(--ink); }

  .btn-gold {
    background: var(--gold);
    color: var(--ink);
    box-shadow: 0 4px 0 #c98e1a, var(--shadow);
  }
  .btn-gold:hover { transform: translateY(-2px); }

  .btn-large { padding: 20px 40px; font-size: 20px; border-radius: 18px; }

  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* Cards */
  .card {
    background: var(--cream);
    border-radius: 20px;
    padding: 28px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(196, 154, 79, 0.2);
  }

  .card-glow {
    background: linear-gradient(135deg, var(--cream) 0%, #FFF9EE 100%);
    border: 1px solid var(--sand-200);
    box-shadow: var(--shadow-lg);
  }

  /* Inputs */
  .input {
    width: 100%;
    padding: 14px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    border: 2px solid var(--sand-200);
    border-radius: 12px;
    background: var(--cream);
    color: var(--ink);
    transition: all 0.2s;
  }
  .input:focus {
    outline: none;
    border-color: var(--terracotta);
    box-shadow: 0 0 0 4px rgba(196,69,54,0.15);
  }

  /* Slider */
  .slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 14px;
    background: linear-gradient(90deg, var(--sand-200), var(--sand-300));
    border-radius: 8px;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--terracotta);
    border: 4px solid var(--cream);
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .slider::-webkit-slider-thumb:hover { transform: scale(1.15); }
  .slider::-moz-range-thumb {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--terracotta);
    border: 4px solid var(--cream);
    cursor: pointer;
  }

  /* Difficulty selector */
  .diff-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .diff-btn {
    background: var(--sand-50);
    border: 2px solid var(--sand-200);
    border-radius: 14px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: inherit;
  }
  .diff-btn:hover {
    transform: translateY(-2px);
    border-color: var(--sand-400);
    box-shadow: 0 4px 12px rgba(45,27,14,0.08);
  }
  .diff-btn.active {
    background: linear-gradient(135deg, var(--gold-soft), var(--gold));
    border-color: var(--terracotta);
    box-shadow: 0 6px 16px rgba(196,69,54,0.25);
    transform: translateY(-2px);
  }
  .diff-emoji { font-size: 30px; line-height: 1; margin-bottom: 6px; }
  .diff-name {
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .diff-desc {
    font-size: 11px;
    color: var(--ink-soft);
    line-height: 1.3;
  }
  @media (max-width: 720px) {
    .diff-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Mode tag selector */
  .modes-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .mode-tag {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--sand-50);
    border: 2px solid var(--sand-200);
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink-soft);
    text-align: left;
    transition: all 0.15s;
  }
  .mode-tag:hover { border-color: var(--sand-400); }
  .mode-tag.active {
    background: var(--cream);
    border-color: var(--terracotta);
    color: var(--ink);
    box-shadow: 0 4px 12px rgba(196,69,54,0.15);
  }
  .mode-emoji { font-size: 22px; }
  .mode-label { flex: 1; font-weight: 600; }
  .mode-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--terracotta);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .mode-tag.active .mode-check { opacity: 1; }
  .mode-tag:not(.active) {
    background: var(--sand-50);
    opacity: 0.6;
  }

  /* ===================== RACE TRACK — 3D DIORAMA ===================== */
  /* Outer wrapper provides 3D perspective and the wooden-booth frame.
     The track itself is tilted backward so we look down into the scene
     from a slight angle, like peering into a fairground attraction. */
  .race-stage {
    perspective: 1400px;
    perspective-origin: 50% 30%;
    margin-bottom: 28px;
    position: relative;
  }

  .race-track {
    /* Sky-to-dune gradient */
    background:
      linear-gradient(180deg,
        #4A7FB5 0%,
        #87CEEB 22%,
        #FFE4B5 55%,
        #E8B26A 75%,
        #B98447 100%);
    border-radius: 26px;
    padding: 28px 18px 20px 18px;
    position: relative;
    overflow: hidden;
    border: 5px solid transparent;
    background-clip: padding-box;

    /* The 3D tilt — back edge recedes, front edge near viewer */
    transform: rotateX(18deg) rotateY(-3deg);
    transform-origin: 50% 100%;
    transform-style: preserve-3d;

    box-shadow:
      0 30px 60px -20px rgba(45,27,14,0.55),
      0 12px 22px rgba(45,27,14,0.25),
      inset 0 2px 0 rgba(255,255,255,0.4),
      inset 0 -8px 30px rgba(120,60,20,0.3);
  }

  /* Wooden booth frame around the whole thing */
  .race-stage::before {
    content: '';
    position: absolute;
    inset: -14px;
    border-radius: 34px;
    background:
      linear-gradient(135deg, #8B5A2B, #6B3F1A 50%, #8B5A2B);
    z-index: -1;
    box-shadow:
      0 20px 50px rgba(45,27,14,0.4),
      inset 0 2px 4px rgba(255,210,160,0.4),
      inset 0 -3px 8px rgba(0,0,0,0.4);
    transform: rotateX(18deg) rotateY(-3deg) translateZ(-20px);
    transform-origin: 50% 100%;
  }

  /* Decorative bunting flags above the booth */
  .race-stage::after {
    content: '';
    position: absolute;
    top: -8px;
    left: 6%;
    right: 6%;
    height: 18px;
    background:
      repeating-linear-gradient(
        90deg,
        var(--terracotta) 0,
        var(--terracotta) 22px,
        var(--gold) 22px,
        var(--gold) 44px,
        var(--teal) 44px,
        var(--teal) 66px,
        var(--cream) 66px,
        var(--cream) 88px);
    clip-path: polygon(
      0% 0%, 100% 0%,
      100% 35%, 96% 100%, 92% 35%,
      88% 35%, 84% 100%, 80% 35%,
      76% 35%, 72% 100%, 68% 35%,
      64% 35%, 60% 100%, 56% 35%,
      52% 35%, 48% 100%, 44% 35%,
      40% 35%, 36% 100%, 32% 35%,
      28% 35%, 24% 100%, 20% 35%,
      16% 35%, 12% 100%, 8% 35%,
      4% 35%, 0% 35%);
    transform: rotateX(18deg) rotateY(-3deg) translateZ(8px);
    transform-origin: 50% 100%;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    pointer-events: none;
  }

  /* Sun, glowing */
  .race-track::before {
    content: '';
    position: absolute;
    top: 8px;
    right: 12%;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #FFE066, #FFB627 60%, #E89117 100%);
    box-shadow:
      0 0 60px rgba(255, 182, 39, 0.7),
      0 0 120px rgba(255, 182, 39, 0.35);
    z-index: 0;
    animation: sun-pulse 4s ease-in-out infinite;
  }

  @keyframes sun-pulse {
    0%, 100% { box-shadow: 0 0 60px rgba(255,182,39,0.7), 0 0 120px rgba(255,182,39,0.35); }
    50%      { box-shadow: 0 0 80px rgba(255,182,39,0.9), 0 0 160px rgba(255,182,39,0.5); }
  }

  /* Distant dunes silhouette */
  .race-track::after {
    content: '';
    position: absolute;
    top: 38%;
    left: 0; right: 0;
    height: 60px;
    background:
      radial-gradient(ellipse 200px 40px at 15% 100%, #C99A4F, transparent 70%),
      radial-gradient(ellipse 280px 50px at 50% 100%, #B98447, transparent 70%),
      radial-gradient(ellipse 240px 45px at 80% 100%, #C99A4F, transparent 70%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.7;
  }

  .lane {
    position: relative;
    height: 60px;
    margin-bottom: 5px;
    padding: 0 10px;
    background:
      linear-gradient(180deg,
        rgba(255,249,238,0.45) 0%,
        rgba(255,228,181,0.35) 100%);
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -2px 6px rgba(120,60,20,0.15),
      0 2px 4px rgba(0,0,0,0.06);
    z-index: 1;
  }
  .lane:last-child { margin-bottom: 0; }

  /* Sandy tread marks per lane */
  .lane-track {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg,
        transparent 0,
        transparent 9.4%,
        rgba(110,68,30,0.20) 9.4%,
        rgba(110,68,30,0.20) 10%);
    opacity: 0.7;
  }

  .lane-label {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 700;
    font-size: 13px;
    z-index: 2;
    pointer-events: none;
    background: var(--cream);
    padding: 4px 10px;
    border-radius: 8px;
    box-shadow:
      0 2px 0 rgba(0,0,0,0.12),
      0 4px 10px rgba(0,0,0,0.18);
    border: 2px solid currentColor;
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .camel {
    position: absolute;
    top: 50%;
    font-size: 40px;
    line-height: 1;
    transition: left 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 3;
    filter:
      drop-shadow(2px 6px 4px rgba(0,0,0,0.4))
      drop-shadow(0 0 1px rgba(0,0,0,0.3));
    animation: camel-idle 2.4s ease-in-out infinite;
    transform-origin: 50% 100%;
    will-change: transform, left;
  }

  /* Subtle idle bobbing — like resting in the heat */
  @keyframes camel-idle {
    0%, 100% { transform: translate(-50%, -50%) translateY(0) rotate(-1.5deg); }
    50%      { transform: translate(-50%, -54%) translateY(-2px) rotate(1.5deg); }
  }

  .camel.moving { animation: camel-trot 0.45s ease-in-out infinite; }
  @keyframes camel-trot {
    0%, 100% { transform: translate(-50%, -50%) translateY(0)   rotate(-4deg); }
    25%      { transform: translate(-50%, -62%) translateY(-8px) rotate(3deg); }
    50%      { transform: translate(-50%, -50%) translateY(-2px) rotate(-2deg); }
    75%      { transform: translate(-50%, -60%) translateY(-6px) rotate(4deg); }
  }

  .finish-line {
    position: absolute;
    top: 14px;
    bottom: 14px;
    right: 22px;
    width: 14px;
    background-image:
      repeating-linear-gradient(0deg, #2D1B0E 0, #2D1B0E 10px, #FFF9EE 10px, #FFF9EE 20px);
    border-radius: 4px;
    z-index: 1;
    box-shadow:
      0 2px 6px rgba(0,0,0,0.35),
      inset 0 0 2px rgba(255,255,255,0.5);
  }

  .finish-flag {
    position: absolute;
    top: -4px;
    right: 12px;
    font-size: 30px;
    z-index: 4;
    transform: rotate(8deg);
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.35));
    animation: flag-wave 1.5s ease-in-out infinite;
  }

  @keyframes flag-wave {
    0%, 100% { transform: rotate(8deg) scaleX(1); }
    50%      { transform: rotate(12deg) scaleX(0.92); }
  }

  .race-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 5;
    padding: 0 6px;
  }

  .round-badge {
    background: var(--ink);
    color: var(--cream);
    padding: 6px 14px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .race-title {
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 800;
    color: var(--ink);
    font-size: 18px;
  }

  /* Multiple choice options */
  .mc-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-top: 18px;
  }

  .mc-option {
    padding: 18px 20px;
    background: var(--cream);
    border: 2px solid var(--sand-200);
    border-radius: 14px;
    font-size: 17px;
    font-weight: 500;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
    text-align: left;
  }
  .mc-option:hover:not(:disabled):not(.revealed) {
    border-color: var(--terracotta);
    background: #FFF4E6;
    transform: translateX(2px);
  }
  .mc-option .letter {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--sand-100);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-family: 'Bricolage Grotesque', serif;
    flex-shrink: 0;
  }
  .mc-option.correct {
    border-color: var(--green);
    background: #E8F5DE;
  }
  .mc-option.correct .letter { background: var(--green); color: white; }
  .mc-option.incorrect {
    border-color: var(--terracotta);
    background: #FCE8E5;
  }
  .mc-option.incorrect .letter { background: var(--terracotta); color: white; }
  .mc-option:disabled { cursor: not-allowed; }

  /* Round content area */
  .round-stage {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .question-block {
    text-align: center;
  }

  .question-text {
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 700;
    font-size: clamp(24px, 3.5vw, 36px);
    line-height: 1.15;
    color: var(--ink);
    margin: 10px 0 8px;
  }

  .question-subtext {
    color: var(--ink-soft);
    font-size: 16px;
    margin-bottom: 10px;
  }

  /* Round type chip */
  .round-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: var(--cream);
    padding: 8px 16px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Team turn banner */
  .team-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--sand-100), var(--cream));
    border: 2px dashed var(--sand-300);
    margin-bottom: 14px;
  }
  .team-banner-emoji {
    font-size: 36px;
  }
  .team-banner-text {
    font-family: 'Bricolage Grotesque', serif;
    font-weight: 700;
    font-size: 22px;
  }
  .team-banner-text small {
    display: block;
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    color: var(--ink-soft);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Flag */
  .flag-display {
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    aspect-ratio: 3/2;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: var(--shadow);
    border: 3px solid var(--cream);
  }

  /* Logo display */
  .logo-display {
    width: 180px;
    height: 180px;
    margin: 0 auto;
    background: var(--cream);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    padding: 24px;
    border: 2px solid var(--sand-200);
  }
  .logo-display img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* Person/photo */
  .person-photo {
    width: 220px;
    height: 220px;
    margin: 0 auto;
    border-radius: 50%;
    object-fit: cover;
    border: 6px solid var(--cream);
    box-shadow: var(--shadow);
  }

  /* Slider rounds */
  .slider-input-container {
    background: var(--cream);
    border-radius: 16px;
    padding: 24px;
    margin-top: 20px;

/* ---------------------------- UTILITIES ----------------------------- */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const app = () => document.getElementById('app');
const rand = (n) => Math.floor(Math.random() * n);
const pick = (arr) => arr[rand(arr.length)];

// Track recently-seen items per pool key so the same question doesn't repeat
// until ~80% of the pool has been used. Returns a fresh item.
const _seenPools = {};
function pickFresh(arr, key) {
  if (!arr.length) return null;
  if (!_seenPools[key]) _seenPools[key] = new Set();
  const seen = _seenPools[key];
  // Reset when most of the pool has been used (keep last few to avoid back-to-back)
  if (seen.size >= Math.max(1, Math.floor(arr.length * 0.8))) {
    // Keep only the last 2 to prevent immediate repeats after reset
    const arrSeen = Array.from(seen);
    seen.clear();
    arrSeen.slice(-2).forEach(s => seen.add(s));
  }
  // Pick fresh
  const fresh = arr.filter(item => !seen.has(itemKey(item)));
  const choice = pick(fresh.length ? fresh : arr);
  seen.add(itemKey(choice));
  return choice;
}
function itemKey(item) {
  if (item == null) return 'null';
  if (typeof item === 'object') return item.name || item.slug || item.article || item.category || item.q || JSON.stringify(item);
  return String(item);
}

// ISO 3166-1 alpha-2 → flag emoji (using regional indicator symbols)
function isoToEmoji(iso) {
  if (!iso || iso.length !== 2) return '🏳️';
  const codePoints = iso.toUpperCase().split('').map(c => 0x1F1E6 + c.charCodeAt(0) - 65);
  return String.fromCodePoint(...codePoints);
}
const shuffle = (arr) => {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = rand(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const decodeHTML = (s) => {
  const t = document.createElement('textarea');
  t.innerHTML = s;
  return t.value;
};
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    const v = attrs[k];
    if (k === 'class') e.className = v;
    else if (k === 'style') e.setAttribute('style', v);
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else if (k === 'html') e.innerHTML = v;
    else if (typeof v === 'boolean') {
      // Boolean attribute: only set when true; presence-only semantics in HTML
      if (v) e.setAttribute(k, '');
    }
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}
function render(node) {
  const root = app();
  root.innerHTML = '';
  root.appendChild(node);
}

/* ------------------------------ API --------------------------------- */
async function fetchTrivia() {
  // Try Open Trivia DB (English), then fall back to curated Dutch
  // Map difficulty 1..4 to API levels (which are easy/medium/hard)
  const d = State.difficulty;
  const apiDiff = d === 1 ? 'easy' : (d === 2 ? 'medium' : 'hard');
  try {
    const res = await fetch(`https://opentdb.com/api.php?amount=1&type=multiple&difficulty=${apiDiff}`);
    const data = await res.json();
    if (data.results && data.results.length) {
      const q = data.results[0];
      return {
        q: decodeHTML(q.question),
        o: shuffle([decodeHTML(q.correct_answer), ...q.incorrect_answers.map(decodeHTML)]),
        correctText: decodeHTML(q.correct_answer),
        source: 'Open Trivia DB (EN)'
      };
    }
  } catch (e) { console.warn('trivia api fail', e); }
  return null;
}

/* ------------------------- ROUND QUEUE LOGIC ------------------------ */
function buildRoundQueue() {
  // Filter by user-selected rounds
  const enabled = State.enabledRounds && State.enabledRounds.size
    ? ROUNDS.filter(r => State.enabledRounds.has(r.key))
    : ROUNDS.slice();
  const pool = enabled.length ? enabled : ROUNDS.slice();
  // Shuffle for variety
  const queue = shuffle(pool.slice());
  // Extend to cover long games (up to 80 rounds)
  while (queue.length < 80) queue.push(pick(pool));
  return queue;
}

function nextRound() {
  if (!State.roundQueue.length) State.roundQueue = buildRoundQueue();
  // Avoid same round 2 in a row
  let r = State.roundQueue.shift();
  if (State.history.length && State.history[State.history.length-1] === r.key && State.roundQueue.length) {
    State.roundQueue.push(r);
    r = State.roundQueue.shift();
  }
  State.history.push(r.key);
  State.currentRound = r;
  State.roundNumber++;
  // Advance team-turn pointer
  if (r.kind === 'team') {
    State.currentTeamIndex = (State.currentTeamIndex + 1) % State.teams.length;
  }
  return r;
}

function checkWin() {
  return State.teams.find(t => t.position >= State.finishLine);
}

/* ---------------------------- START GAME ---------------------------- */
function startGame() {
  // Validate
  if (State.teams.length < 2) return alert('Minstens 2 teams nodig');
  State.teams.forEach((t, i) => {
    if (!t.name.trim()) t.name = `Team ${i+1}`;
    t.position = 0;
    t.color = TEAM_COLORS[i % TEAM_COLORS.length];
  });
  State.roundNumber = 0;
  State.currentTeamIndex = -1; // so nextRound() advances to 0
  State.roundQueue = buildRoundQueue();
  State.history = [];
  startNextRound();
}

function startNextRound() {
  // Check win first
  const winner = checkWin();
  if (winner) { return showGameOver(winner); }
  const r = nextRound();
  renderRoundScreen();
  // Random easter egg: ~8% chance of German moustached man appearing
  if (Math.random() < 0.08) {
    setTimeout(showGermanMan, 1200);
  }
}

/* --------------------- ROUND IMPLEMENTATIONS ------------------------ */
async function renderRound(stage, round) {
  stage.innerHTML = '<div class="text-center"><div class="spinner"></div><p class="mt-2 hint">Vraag wordt geladen…</p></div>';
  try {
    switch (round.key) {
      case 'math':       return renderMath(stage);
      case 'capital':    return await renderCapital(stage);
      case 'flag':       return await renderFlag(stage);
      case 'silhouette': return renderSilhouette(stage);
      case 'logo':       return renderLogo(stage);
      case 'revenue':    return renderRevenue(stage);
      case 'history':    return renderHistory(stage);
      case 'knowledge':  return await renderKnowledge(stage);
      case '30s':        return render30s(stage);
      case 'draw':       return renderDraw(stage);
      case 'map':        return renderMap(stage);
      case 'popularity': return await renderPopularity(stage);
      case 'ranking':    return renderRanking(stage);
    }
  } catch (e) {
    console.error(e);
    stage.innerHTML = '<p class="text-center">Oeps, deze ronde wilde niet laden. Druk op overslaan.</p>';
    stage.appendChild(el('div', { class: 'text-center mt-4' },
      el('button', { class: 'btn btn-secondary', onclick: () => moveAndContinue([]) }, 'Overslaan →')
    ));
  }
}

/* ------------------------------ HELPERS ----------------------------- */
function moveTeams(teamIndexes, steps = 1) {
  // teamIndexes: array of {idx, steps}
  if (Array.isArray(teamIndexes) && teamIndexes.length && typeof teamIndexes[0] === 'object') {
    teamIndexes.forEach(({idx, steps}) => {
      State.teams[idx].position += steps;
    });
  } else {
    teamIndexes.forEach(idx => { State.teams[idx].position += steps; });
  }
}

function showRoundResultAndContinue(html, moves = []) {
  // Apply moves
  moveTeams(moves);

/* ============================== MATH =============================== */
function renderMath(stage) {
  const d = State.difficulty;
  const types = ['add', 'sub', 'mul', 'mix'];
  const type = pick(types);
  let q, a;

  // Range scaling by difficulty
  const addMax = [50, 150, 350, 700][d-1];
  const subMax = [80, 300, 700, 1500][d-1];
  const mulX   = [10, 18, 25, 40][d-1];
  const mulY   = [8, 12, 15, 20][d-1];
  const mixX   = [10, 18, 25, 35][d-1];
  const mixY   = [6, 9, 12, 15][d-1];
  const mixZ   = [8, 12, 18, 30][d-1];

  if (type === 'add') {
    const x = 10 + rand(addMax), y = 10 + rand(addMax);
    q = `${x} + ${y}`; a = x + y;
  } else if (type === 'sub') {
    const x = 30 + rand(subMax), y = 10 + rand(x - 5);
    q = `${x} − ${y}`; a = x - y;
  } else if (type === 'mul') {
    const x = 3 + rand(mulX), y = 3 + rand(mulY);
    q = `${x} × ${y}`; a = x * y;
  } else {
    const x = 4 + rand(mixX), y = 3 + rand(mixY), z = 2 + rand(mixZ);
    q = `${x} × ${y} − ${z}`; a = x * y - z;
  }
  // Generate 4 plausibly-close options
  const opts = new Set([a]);
  const distractorRange = Math.max(5, Math.round(a * 0.15));
  while (opts.size < 4) {
    const delta = (1 + rand(distractorRange)) * (Math.random() < 0.5 ? -1 : 1);
    if (a + delta > 0 && !opts.has(a + delta)) opts.add(a + delta);
  }
  const choices = shuffle(Array.from(opts).map(String));

  stage.innerHTML = '';
  stage.appendChild(el('div', { class: 'question-block' },
    el('p', { class: 'question-subtext' }, 'Bereken zo snel mogelijk'),
    el('div', { class: 'question-text' }, q + ' = ?'),
    buildMCGrid(choices, String(a), (correct) => {
      if (correct) correctTeamResult(State.currentTeamIndex, `Antwoord: <strong>${a}</strong>`);
      else incorrectTeamResult(State.currentTeamIndex, `Het juiste antwoord was <strong>${a}</strong>`);
    })
  ));
}

function buildMCGrid(choices, correctText, onAnswer) {
  const grid = el('div', { class: 'mc-grid' });
  choices.forEach((c, i) => {
    const btn = el('button', {
      class: 'mc-option',
      type: 'button'
    });
    btn.appendChild(el('div', { class: 'letter' }, String.fromCharCode(65 + i)));
    btn.appendChild(el('span', null, c));
    btn.addEventListener('click', () => {
      // Reveal correct/incorrect
      grid.querySelectorAll('.mc-option').forEach(b => {
        b.disabled = true;
        b.classList.add('revealed');
        const txt = b.querySelector('span').textContent;
        if (txt === correctText) b.classList.add('correct');
        else if (b === btn) b.classList.add('incorrect');
      });
      setTimeout(() => onAnswer(c === correctText), 1200);
    });
    grid.appendChild(btn);
  });
  return grid;
}

function renderSilhouette(stage) {

  const FAMOUS = new Set([
    'nl','be','de','fr','es','it','gb','us','cn','jp','br','au','ru','in','ca','mx','eg','tr','gr','ie','pt','se','no','dk','fi','pl','at','ch','za'
  ]);

  if (d === 1) pool = COUNTRY_DATA.filter(c => FAMOUS.has(c.iso));
  else if (d === 2) pool = COUNTRY_DATA.filter(c => FAMOUS.has(c.iso) || SOMEWHAT.has(c.iso));

    if (d2.name !== c.name && !distractors.includes(d2.name)) distractors.push(d2.name);

/* ----------------- Shared slider round (all teams) ----------------- */
function renderSliderRound(stage, cfg) {
  State.sliderAnswers = {};
  stage.innerHTML = '';
  const block = el('div', { class: 'question-block' });
  block.appendChild(el('p', { class: 'question-subtext' }, cfg.subtext || ''));
  const qt = el('div', { class: 'question-text' });
  qt.innerHTML = `${cfg.icon || ''} ${cfg.question.replace('\n', '<br><span style="font-family: Caveat; color: var(--ink-soft); font-size: 0.7em">').replace(/«/, '“').replace(/»/, '”</span>')}`;
  block.appendChild(qt);
  stage.appendChild(block);

  // Randomized turn order so it's not always team 0 first
  const turnOrder = shuffle(State.teams.map((_, i) => i));
  let turnIdx = 0;
  const sliderHost = el('div', { id: 'sliderHost' });
  stage.appendChild(sliderHost);

  function showTurn() {
    sliderHost.innerHTML = '';
    if (turnIdx >= turnOrder.length) {
      revealSliderResults(cfg);
      return;
    }
    const teamIdx = turnOrder[turnIdx];
    const t = State.teams[teamIdx];

    // Privacy curtain
    const curtain = el('div', { class: 'privacy-curtain' });
    curtain.appendChild(el('div', { class: 'curtain-emoji' }, t.emoji));
    curtain.appendChild(el('div', { class: 'curtain-name', style: `color: ${t.color}` }, `${t.name}`));
    curtain.appendChild(el('div', { class: 'curtain-msg' }, 'Anderen → kijk weg!'));
    curtain.appendChild(el('button', {
      class: 'btn btn-primary btn-large',
      onclick: () => { curtain.remove(); showSlider(teamIdx, t); }
    }, '🎚️ Ik mag de slider zien'));
    sliderHost.appendChild(curtain);
  }

  function showSlider(teamIdx, t) {
    sliderHost.innerHTML = '';
    const card = el('div', { class: 'slider-input-container' });
    const teamHead = el('div', {
      class: 'slider-team-head',
      style: `background: ${t.color}; color: white`
    });
    teamHead.appendChild(el('span', { style: 'font-size: 22px' }, t.emoji));
    teamHead.appendChild(el('span', { style: 'font-weight: 700; flex: 1' }, `${t.name} — schuif jouw gok`));
    const timerCh = el('span', { class: 'turn-timer slider-timer' }, '30s');
    teamHead.appendChild(timerCh);
    card.appendChild(teamHead);

    const initial = (cfg.min + cfg.max) / 2;
    State.sliderAnswers[teamIdx] = initial;

    const sliderRow = el('div', { class: 'team-slider-row-solo' });
    const slider = el('input', {
      type: 'range', min: cfg.min, max: cfg.max, step: cfg.step,
      value: initial, class: 'slider', style: 'flex: 1'
    });
    const valDisplay = el('div', { class: 'slider-big-val' });
    valDisplay.textContent = cfg.format(initial);
    slider.addEventListener('input', (e) => {
      const v = +e.target.value;
      State.sliderAnswers[teamIdx] = v;
      valDisplay.textContent = cfg.format(v);
    });
    sliderRow.appendChild(slider);
    sliderRow.appendChild(valDisplay);
    card.appendChild(sliderRow);

    const range = el('div', { class: 'slider-range' });
    range.appendChild(el('span', null, cfg.format(cfg.min)));
    range.appendChild(el('span', null, cfg.format(cfg.max)));
    card.appendChild(range);

    const submitBtn = el('button', {
      class: 'btn btn-primary btn-large',
      style: 'margin-top: 16px',
      onclick: () => {
        clearInterval(timer);
        turnIdx++;
        showTurn();
      }
    }, '✅ Gok vastleggen');
    card.appendChild(el('div', { class: 'text-center' }, submitBtn));

    sliderHost.appendChild(card);

    // 30 second timer
    let timeLeft = 30;
    const timer = setInterval(() => {
      timeLeft--;
      timerCh.textContent = `${timeLeft}s`;
      if (timeLeft <= 5) timerCh.classList.add('urgent');
      if (timeLeft <= 0) {
        clearInterval(timer);
        turnIdx++;
        showTurn();
      }
    }, 1000);
  }

  showTurn();
}

function revealSliderResults(cfg) {
  // Compute distances
  const results = State.teams.map((t, idx) => ({
    idx, name: t.name, emoji: t.emoji, color: t.color,
    guess: State.sliderAnswers[idx],
    distance: Math.abs(State.sliderAnswers[idx] - cfg.answer)
  })).sort((a, b) => a.distance - b.distance);

  // Award moves: winner +2, runner-up +1, exact tie share top spot
  const minDist = results[0].distance;
  const winners = results.filter(r => r.distance === minDist);
  const runnerDist = results.find(r => r.distance > minDist)?.distance;
  const runners = runnerDist !== undefined ? results.filter(r => r.distance === runnerDist) : [];

  const moves = [];
  winners.forEach(w => moves.push({ idx: w.idx, steps: 2 }));
  if (winners.length === 1) runners.forEach(r => moves.push({ idx: r.idx, steps: 1 }));

  // Build result HTML
  let html = `<div style="font-size: 56px">${cfg.icon || '🎯'}</div>`;
  html += `<h2 style="font-family: Bricolage Grotesque; font-size: 32px; margin: 8px 0 4px">Het antwoord was <span class="text-pop">${cfg.answerText}</span></h2>`;
  html += `<div style="margin-top: 18px; text-align: left; max-width: 520px; margin-left: auto; margin-right: auto">`;
  results.forEach((r, i) => {
    const isWin = r.distance === minDist;
    const isRunner = winners.length === 1 && runnerDist !== undefined && r.distance === runnerDist;
    const trophy = isWin ? '🏆 +2' : (isRunner ? '🥈 +1' : '');
    html += `<div class="result-row ${isWin ? 'winner' : ''}">
      <span style="font-size: 26px">${r.emoji}</span>
      <span style="font-weight: 700; color: ${r.color}; flex: 1">${r.name}</span>
      <span style="font-variant-numeric: tabular-nums">${cfg.format(r.guess)}</span>
      <span style="opacity: 0.6; font-size: 12px">Δ ${cfg.format(r.distance)}</span>
      <span style="font-weight: 700; min-width: 60px; text-align: right">${trophy}</span>
    </div>`;
  });
  html += '</div>';

  showRoundResultAndContinue(html, moves);
}

function begin30s(stage, set) {
  let words = set.words.slice();
  let answered = []; // {word, status: 'correct'|'skipped'}
  let secondsLeft = 30;
  let interval;
  const describerIdx = State.currentTeamIndex;

  stage.innerHTML = '';
  // Timer bar
  const timerBar = el('div', { class: 'timer-bar' });
  const fill = el('div', { class: 'timer-fill', style: 'width: 100%' });
  timerBar.appendChild(fill);
  const timerNum = el('div', {
    class: 'text-center display',
    style: 'font-size: 56px; color: var(--terracotta); margin-bottom: 8px'
  }, '30');
  stage.appendChild(timerNum);
  stage.appendChild(timerBar);

  // Word list
  const listEl = el('div', { class: 'word-list' });
  function refresh() {
    listEl.innerHTML = '';
    words.forEach((w, i) => {
      const row = el('div', { class: 'word-item' });
      row.appendChild(el('span', null, w));
      const actions = el('div', { class: 'word-item-actions' });
      actions.appendChild(el('button', {
        class: 'word-icon-btn ok',
        onclick: () => { answered.push({ word: w, status: 'correct' }); words.splice(i, 1); refresh(); }
      }, '✓'));
      actions.appendChild(el('button', {
        class: 'word-icon-btn no',
        onclick: () => { answered.push({ word: w, status: 'skipped' }); words.splice(i, 1); refresh(); }
      }, '✕'));
      row.appendChild(actions);
      listEl.appendChild(row);
    });
    if (!words.length) endTimerPhase();
  }
  refresh();
  stage.appendChild(listEl);

  function endTimerPhase() {
    clearInterval(interval);
    // Show attribution screen: for each correctly-guessed word, ask which team got it
    const correctWords = answered.filter(a => a.status === 'correct').map(a => a.word);
    if (!correctWords.length) {
      // Nobody got anything
      const html = `<div style="font-size: 56px">🥲</div>
        <h2 style="font-family: Bricolage Grotesque; font-size: 28px; margin: 8px 0 4px">Niemand kreeg een woord goed</h2>
        <p class="text-soft">Geen stappen deze ronde.</p>`;
      showRoundResultAndContinue(html, []);
      return;
    }
    showAttribution(correctWords);
  }

  function showAttribution(correctWords) {
    stage.innerHTML = '';
    const attribs = {};   // word -> teamIdx (or null = describer team default)
    correctWords.forEach(w => { attribs[w] = describerIdx; });

    const header = el('div', { style: 'text-align:center; margin-bottom: 16px' });
    header.appendChild(el('h2', { class: 'display', style: 'font-size: 28px; margin-bottom: 4px' },
      '🎤 Wie raadde wat?'));
    header.appendChild(el('p', { class: 'hint' },
      'Klik bij elk woord het team aan dat het eerst goed raadde. Elk team krijgt +1 stap per woord.'));
    stage.appendChild(header);

    const wordsWrap = el('div', { class: 'attrib-list' });

    function redraw() {
      wordsWrap.innerHTML = '';
      correctWords.forEach(w => {
        const row = el('div', { class: 'attrib-row' });
        row.appendChild(el('div', { class: 'attrib-word' }, w));
        const teamRow = el('div', { class: 'attrib-teams' });
        State.teams.forEach((t, idx) => {
          const isSel = attribs[w] === idx;
          const pill = el('button', {
            class: 'attrib-pill' + (isSel ? ' active' : ''),
            style: isSel
              ? `background:${t.color}; border-color:${t.color}; color:white`
              : `border-color:${t.color}55; color:${t.color}`,
            onclick: () => { attribs[w] = idx; redraw(); }
          });
          pill.appendChild(el('span', { style: 'font-size: 16px' }, t.emoji));
          pill.appendChild(el('span', null, t.name));
          teamRow.appendChild(pill);
        });
        // "Niemand" option
        const nonePill = el('button', {
          class: 'attrib-pill' + (attribs[w] === null ? ' active' : ''),
          style: attribs[w] === null
            ? 'background:#777; border-color:#777; color:white'
            : 'border-color:#aaa; color:#777',
          onclick: () => { attribs[w] = null; redraw(); }
        }, '— niemand');
        teamRow.appendChild(nonePill);
        row.appendChild(teamRow);
        wordsWrap.appendChild(row);
      });
    }
    redraw();
    stage.appendChild(wordsWrap);

    const submit = el('div', { class: 'text-center mt-6' },
      el('button', {
        class: 'btn btn-primary btn-large',
        onclick: () => {
          // Tally: per correct word, +1 to guesser team AND +1 to describer team (wederzijds)
          const tally = {};
          correctWords.forEach(w => {
            // Describer's team always gets +1 per correct word
            tally[describerIdx] = (tally[describerIdx] || 0) + 1;
            // Guesser team also gets +1 (could be the same team as describer)
            const t = attribs[w];
            if (t !== null && t !== undefined && t !== describerIdx) {
              tally[t] = (tally[t] || 0) + 1;
            } else if (t === describerIdx) {
              // If describer's own team guessed, they already got +1 above — give them another
              // Wait: that would double-count. Re-think: describer always gets 1.
              // If guesser != describer, guesser also gets 1. If guesser === describer team,
              // they only get 1 (describer credit covers it). Adjust: only add for guesser if different.
              // (Currently no-op since branch is empty in that case.)
            }
          });
          const moves = Object.entries(tally).map(([idx, steps]) => ({ idx: +idx, steps }));

          let html = `<div style="font-size: 56px">🎤</div>
            <h2 class="display" style="font-size: 28px; margin: 8px 0 4px">${correctWords.length} ${correctWords.length === 1 ? 'woord' : 'woorden'} goed!</h2>
            <p class="hint" style="margin-bottom: 14px">Beschrijver + rader krijgen elk een stap per goed woord</p>
            <div style="margin-top: 8px; max-width: 540px; margin: 8px auto 0; text-align: left">`;
          if (!moves.length) {
            html += '<p class="text-soft text-center">Niemand kreeg punten toegewezen.</p>';
          } else {
            moves.sort((a, b) => b.steps - a.steps).forEach(m => {
              const t = State.teams[m.idx];
              const role = m.idx === describerIdx ? ' (beschrijver)' : '';
              html += `<div class="result-row winner">
                <span style="font-size: 24px">${t.emoji}</span>
                <span style="font-weight: 700; color: ${t.color}; flex: 1">${t.name}${role}</span>
                <span style="font-weight: 700">+${m.steps} ${m.steps === 1 ? 'stap' : 'stappen'}</span>
              </div>`;
            });
          }
          html += '</div>';
          showRoundResultAndContinue(html, moves);
        }
      }, '✅ Stappen toekennen')
    );
    stage.appendChild(submit);
  }

  interval = setInterval(() => {
    secondsLeft--;
    fill.style.width = `${(secondsLeft / 30) * 100}%`;
    timerNum.textContent = secondsLeft;
    if (secondsLeft <= 0) endTimerPhase();
  }, 1000);
}

function beginDrawing(stage, word) {
  // Show word in a popup-style overlay
  if (!confirm(`Het woord is:\n\n${word}\n\nKlik OK als de tekenaar het heeft gezien en klaar is om te tekenen.`)) return;
  stage.innerHTML = '';

  stage.appendChild(el('p', { class: 'question-subtext text-center' }, '🎨 Teken het woord — de andere teams raden!'));

  const canvas = el('canvas', { class: 'drawing-board', width: 800, height: 420 });
  stage.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#2D1B0E';
  let drawing = false, lastX = 0, lastY = 0;
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const sx = canvas.width / r.width, sy = canvas.height / r.height;
    if (e.touches && e.touches[0]) {
      return [(e.touches[0].clientX - r.left) * sx, (e.touches[0].clientY - r.top) * sy];
    }
    return [(e.clientX - r.left) * sx, (e.clientY - r.top) * sy];
  }
  function start(e) { drawing = true; [lastX, lastY] = getPos(e); e.preventDefault(); }
  function draw(e) {
    if (!drawing) return;
    const [x, y] = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
    [lastX, lastY] = [x, y];
    e.preventDefault();
  }
  function stop() { drawing = false; }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);
  canvas.addEventListener('touchstart', start);
  canvas.addEventListener('touchmove', draw);
  canvas.addEventListener('touchend', stop);

  // Color palette + size + clear
  const colors = ['#2D1B0E','#C44536','#1B6F84','#FFB627','#7FB069','#F4538A','#FFFFFF'];
  const controls = el('div', { class: 'draw-controls' });
  colors.forEach((c, i) => {
    const b = el('button', {
      class: 'color-btn' + (i === 0 ? ' active' : ''),
      style: `background: ${c}; ${c==='#FFFFFF' ? 'border: 3px solid #ccc' : ''}`,
      onclick: () => {
        ctx.strokeStyle = c;
        ctx.lineWidth = c === '#FFFFFF' ? 22 : 4;
        controls.querySelectorAll('.color-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      }
    });
    controls.appendChild(b);
  });
  const clearBtn = el('button', {
    class: 'btn btn-ghost', style: 'padding: 8px 16px',
    onclick: () => { ctx.fillStyle = 'white'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
  }, 'Wis');
  controls.appendChild(clearBtn);
  stage.appendChild(controls);

  // Timer 60 sec + reveal/winner buttons
  let timeLeft = 90;
  const timer = el('div', { class: 'display text-center', style: 'font-size: 28px; color: var(--terracotta); margin-top: 12px' }, `⏱️ ${timeLeft}s`);
  stage.appendChild(timer);
  const interval = setInterval(() => {
    timeLeft--;
    timer.textContent = `⏱️ ${timeLeft}s`;
    if (timeLeft <= 0) clearInterval(interval);
  }, 1000);

  // Resolution: who guessed first?
  const resolveCard = el('div', { class: 'card mt-4', style: 'background: var(--sand-50)' });
  resolveCard.appendChild(el('h3', { style: 'margin-bottom: 8px' }, 'Wie heeft het geraden?'));
  resolveCard.appendChild(el('p', { class: 'hint mb-4' }, 'Selecteer het team dat het eerst correct heeft geraden (zij krijgen +1, de tekenaar ook). Of klik op "Niemand".'));
  const teamButtons = el('div', { style: 'display: flex; flex-wrap: wrap; gap: 8px' });
  State.teams.forEach((t, idx) => {
    if (idx === State.currentTeamIndex) return; // drawer's team can't guess itself
    teamButtons.appendChild(el('button', {
      class: 'btn btn-secondary',
      style: `border-color: ${t.color}; color: ${t.color}`,
      onclick: () => {
        clearInterval(interval);
        const guesser = idx;
        const drawer = State.currentTeamIndex;
        showRoundResultAndContinue(
          `<div style="font-size: 50px">🎨</div>
           <h2 style="font-family: Bricolage Grotesque; font-size: 28px">Het woord was <span class="text-pop">${word}</span></h2>
           <p class="text-soft mt-2"><strong>${State.teams[guesser].name}</strong> raadde het — +1. Ook <strong>${State.teams[drawer].name}</strong> krijgt +1 voor het tekenen.</p>`,
          [{ idx: guesser, steps: 1 }, { idx: drawer, steps: 1 }]
        );
      }
    }, `${t.emoji} ${t.name}`));
  });
  teamButtons.appendChild(el('button', {
    class: 'btn btn-ghost',
    onclick: () => {
      clearInterval(interval);
      showRoundResultAndContinue(
        `<div style="font-size: 50px">🤷</div>
         <h2 style="font-family: Bricolage Grotesque; font-size: 28px">Niemand!</h2>
         <p class="text-soft mt-2">Het woord was <strong>${word}</strong></p>`,
        []
      );
    }
  }, 'Niemand'));
  resolveCard.appendChild(teamButtons);
  stage.appendChild(resolveCard);
}

/* ============================== MAP ================================ */
function renderMap(stage) {
  // Pick a target from the user's difficulty bucket (with ±1 wiggle for variety)
  const diff = State.difficulty;
  const allowed = MAP_TARGETS.filter(t => Math.abs(t.d - diff) <= 1);
  const pool = allowed.length ? allowed : MAP_TARGETS;
  const target = pickFresh(pool, 'map');
  State.mapAnswers = {};
  stage.innerHTML = '';

  const block = el('div', { class: 'question-block' });
  block.appendChild(el('p', { class: 'question-subtext' }, 'Iedere team klikt om de beurt zo dicht mogelijk bij'));
  block.appendChild(el('div', { class: 'question-text' }, `🛰️ ${target.name}`));
  block.appendChild(el('p', { class: 'hint', style: 'margin-top: 8px' },
    '👀 De klikken van andere teams blijven verborgen — niemand kan afkijken!'));
  stage.appendChild(block);

  // Layer toggle bar
  const layerBar = el('div', { class: 'map-layer-bar' });
  const satBtn = el('button', { class: 'map-layer-btn active', 'data-layer': 'sat' }, '🛰️ Satelliet');
  const strBtn = el('button', { class: 'map-layer-btn', 'data-layer': 'street' }, '🗺️ Straat');
  layerBar.appendChild(satBtn);
  layerBar.appendChild(strBtn);
  stage.appendChild(layerBar);

  // Map div
  const mapDiv = el('div', { id: 'worldMap' });
  stage.appendChild(mapDiv);

  // Status / turn indicator
  const status = el('div', { class: 'text-center mt-4', style: 'font-weight: 700; font-size: 18px; min-height: 40px' });
  stage.appendChild(status);

  // Init Leaflet
  setTimeout(() => {
    if (typeof L === 'undefined') {
      stage.appendChild(el('div', { class: 'card', style: 'text-align:center; padding: 20px' },
        el('p', null, '⚠️ Leaflet kon niet geladen worden (geen internet?). Ronde wordt overgeslagen.')));
      setTimeout(() => moveAndContinue([]), 2000);
      return;
    }
    const map = L.map('worldMap', { worldCopyJump: true, minZoom: 1, attributionControl: false })
                 .setView([20, 10], 2);

    // Satellite tile layer (ESRI World Imagery — free, no auth, NO labels)
    const satLayer = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 18, attribution: 'Tiles © Esri' }
    );
    // Street layer (OSM) — has labels by default; that's intentional for "easy" mode
    const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 18
    });

    // Default to satellite (no labels — harder)
    satLayer.addTo(map);
    let useStreet = false;

    satBtn.onclick = () => {
      if (!useStreet) return;
      map.removeLayer(streetLayer);
      satLayer.addTo(map);
      useStreet = false;
      satBtn.classList.add('active');
      strBtn.classList.remove('active');
    };
    strBtn.onclick = () => {
      if (useStreet) return;
      map.removeLayer(satLayer);
      streetLayer.addTo(map);
      useStreet = true;
      strBtn.classList.add('active');
      satBtn.classList.remove('active');
    };

    // Build a randomized turn order so the same team doesn't always go first
    const turnOrder = shuffle(State.teams.map((_, i) => i));
    let turnIdx = 0;
    let turnTimerHandle = null;

    function showTurn() {
      if (turnTimerHandle) { clearInterval(turnTimerHandle); turnTimerHandle = null; }
      if (turnIdx >= turnOrder.length) {
        // ===== REVEAL =====
        // Drop target marker
        const targetMarker = L.marker([target.lat, target.lng], {
          icon: L.divIcon({
            html: '<div style="font-size:32px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6))">🎯</div>',
            className: '', iconSize: [32, 32], iconAnchor: [16, 16]
          })
        }).addTo(map);
        targetMarker.bindPopup(`<strong>${target.name}</strong>`).openPopup();

        // Show ALL team clicks at once (this is the moment of truth)
        const results = State.teams.map((t, idx) => {
          const a = State.mapAnswers[idx];
          const d = haversine(a.lat, a.lng, target.lat, target.lng);
          return { idx, dist: d, name: t.name, emoji: t.emoji, color: t.color, lat: a.lat, lng: a.lng };
        }).sort((a, b) => a.dist - b.dist);

        results.forEach(r => {
          // Marker
          L.marker([r.lat, r.lng], {
            icon: L.divIcon({
              html: `<div style="background:${r.color};color:white;padding:5px 10px;border-radius:999px;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 3px 8px rgba(0,0,0,0.4);border:2px solid white">${r.emoji} ${r.name}</div>`,
              className: '', iconSize: [140, 26], iconAnchor: [70, 13]
            })
          }).addTo(map);
          // Line to target
          L.polyline([[r.lat, r.lng], [target.lat, target.lng]], {
            color: r.color, weight: 2.5, dashArray: '6,8'
          }).addTo(map);
        });

        // Auto-fit bounds so all markers visible
        const bounds = L.latLngBounds([
          [target.lat, target.lng],
          ...results.map(r => [r.lat, r.lng])
        ]);
        map.fitBounds(bounds.pad(0.25));

        status.innerHTML = '';
        const reveal = el('button', {
          class: 'btn btn-primary btn-large',
          onclick: () => {
            const minD = results[0].dist;
            const winners = results.filter(r => r.dist === minD);
            const runnerD = results.find(r => r.dist > minD)?.dist;
            const runners = runnerD !== undefined ? results.filter(r => r.dist === runnerD) : [];
            const moves = [];
            winners.forEach(w => moves.push({ idx: w.idx, steps: 2 }));
            if (winners.length === 1) runners.forEach(r => moves.push({ idx: r.idx, steps: 1 }));
            let html = `<div style="font-size: 56px">🎯</div><h2 style="font-family: Bricolage Grotesque; font-size: 28px; margin: 8px 0 4px">Het was <span class="text-pop">${target.name}</span></h2>`;
            html += '<div style="margin-top: 18px; text-align: left; max-width: 520px; margin: 18px auto 0">';
            results.forEach((r) => {
              const isW = r.dist === minD;
              const isR = winners.length === 1 && runnerD !== undefined && r.dist === runnerD;
              const trophy = isW ? '🏆 +2' : (isR ? '🥈 +1' : '');
              html += `<div class="result-row ${isW ? 'winner' : ''}">
                <span style="font-size: 24px">${r.emoji}</span>
                <span style="font-weight: 700; color: ${r.color}; flex: 1">${r.name}</span>
                <span style="font-variant-numeric: tabular-nums">${Math.round(r.dist)} km</span>
                <span style="font-weight: 700; min-width: 60px; text-align: right">${trophy}</span>
              </div>`;
            });
            html += '</div>';
            showRoundResultAndContinue(html, moves);
          }
        }, '🏁 Naar de uitslag');
        status.appendChild(reveal);
        return;
      }
      const teamIdx = turnOrder[turnIdx];
      const t = State.teams[teamIdx];
      status.innerHTML = '';

      // Privacy curtain — shown until team clicks "Klaar, ik kijk!" so others can look away
      const curtain = el('div', { class: 'privacy-curtain' });
      curtain.appendChild(el('div', { class: 'curtain-emoji' }, t.emoji));
      curtain.appendChild(el('div', { class: 'curtain-name', style: `color: ${t.color}` }, `${t.name}`));
      curtain.appendChild(el('div', { class: 'curtain-msg' }, 'Anderen → kijk weg!'));
      const goBtn = el('button', {
        class: 'btn btn-primary btn-large',
        onclick: () => {
          curtain.remove();
          startClickTimer();
        }
      }, '👀 Ik ben klaar, toon de kaart');
      curtain.appendChild(goBtn);
      status.appendChild(curtain);

      function startClickTimer() {
        // 30 seconds to click
        let timeLeft = 30;
        status.innerHTML = '';
        const turn = el('div', {
          class: 'map-turn-indicator',
          style: `background: ${t.color}15; border: 2px solid ${t.color}55`
        });
        turn.appendChild(el('span', { style: 'font-size: 24px' }, t.emoji));
        turn.appendChild(el('span', { style: `color: ${t.color}; font-weight: 700` }, `${t.name} → klik op de kaart!`));
        const timerCh = el('span', { class: 'turn-timer' }, `${timeLeft}s`);
        turn.appendChild(timerCh);
        status.appendChild(turn);

        turnTimerHandle = setInterval(() => {
          timeLeft--;
          timerCh.textContent = `${timeLeft}s`;
          if (timeLeft <= 5) timerCh.classList.add('urgent');
          if (timeLeft <= 0) {
            clearInterval(turnTimerHandle);
            turnTimerHandle = null;
            // Auto-pick: random faraway point (Antarctica)
            State.mapAnswers[teamIdx] = { lat: -85 + Math.random()*4, lng: -180 + Math.random()*360 };
            turnIdx++;
            showTurn();
          }
        }, 1000);
      }
    }

    map.on('click', (e) => {
      if (turnIdx >= turnOrder.length) return;
      // Don't accept clicks until the curtain is dismissed and timer is running
      if (!turnTimerHandle) return;
      const teamIdx = turnOrder[turnIdx];
      // Store the click but do NOT show a marker — keep it secret
      State.mapAnswers[teamIdx] = { lat: e.latlng.lat, lng: e.latlng.lng };
      // Flash a brief confirmation circle that fades quickly
      const ghostIcon = L.divIcon({
        html: `<div class="map-click-ghost"></div>`,
        className: '', iconSize: [24, 24], iconAnchor: [12, 12]
      });
      const ghost = L.marker([e.latlng.lat, e.latlng.lng], { icon: ghostIcon, interactive: false }).addTo(map);
      setTimeout(() => map.removeLayer(ghost), 700);

      clearInterval(turnTimerHandle);
      turnTimerHandle = null;
      turnIdx++;
      showTurn();
    });
    showTurn();
  }, 50);
}

function haversine(lat1, lon1, lat2, lon2) {
  const toRad = (d) => d * Math.PI / 180;
  const R = 6371; // km
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

// Uses Wikimedia REST Pageviews API — free, no auth, CORS-friendly, updated daily.
// Endpoint: /metrics/pageviews/per-article/{project}/all-access/all-agents/{title}/daily/{start}/{end}
function getLast30DaysRange() {
  const now = new Date();
  // End: yesterday (last full day with data)
  const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  // Start: 30 days before end
  const start = new Date(end.getFullYear(), end.getMonth(), end.getDate() - 29);
  const fmt = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}${m}${day}`;
  };
  return { start: fmt(start), end: fmt(end) };
}

async function fetchWikiViews(article) {
  const { start, end } = getLast30DaysRange();
  const encoded = encodeURIComponent(article);
  const url = `https://wikimedia.org/api/rest_v1/metrics/pageviews/per-article/nl.wikipedia/all-access/all-agents/${encoded}/daily/${start}/${end}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    if (!data.items || !data.items.length) return null;
    return data.items.reduce((sum, item) => sum + (item.views || 0), 0);
  } catch (e) {
    console.warn('wiki views fail for', article, e);
    return null;
  }
}

      el('p', null, 'Niet genoeg opties voor deze ronde — wordt overgeslagen.')));

  }
  State.popAnswers = {};
  stage.innerHTML = '';

  const block = el('div', { class: 'question-block' });

  block.appendChild(el('p', { class: 'hint', style: 'margin-top: 6px' },
    'Iedere team kiest een ander onderwerp. Wie wie heeft is geheim — je ziet alleen wat al gekozen is. Daarna halen we de échte pageviews op van Wikipedia. Meeste hits = winnaar.'));
  stage.appendChild(block);

  const host = el('div', { id: 'popHost' });
  stage.appendChild(host);

  // Random turn order
  const turnOrder = shuffle(State.teams.map((_, i) => i));
  let turnIdx = 0;
  let timer = null;

  function showCurtain() {
    if (timer) { clearInterval(timer); timer = null; }
    host.innerHTML = '';
    if (turnIdx >= turnOrder.length) {
      revealPopularity();
      return;
    }
    const teamIdx = turnOrder[turnIdx];
    const t = State.teams[teamIdx];

    const curtain = el('div', { class: 'privacy-curtain' });
    curtain.appendChild(el('div', { class: 'curtain-emoji' }, t.emoji));
    curtain.appendChild(el('div', { class: 'curtain-name', style: `color: ${t.color}` }, `${t.name}`));
    curtain.appendChild(el('div', { class: 'curtain-msg' }, 'Anderen → kijk weg!'));
    curtain.appendChild(el('button', {
      class: 'btn btn-primary btn-large',
      onclick: () => { curtain.remove(); showPicker(teamIdx, t); }
    }, '🔥 Ik mag kiezen'));
    host.appendChild(curtain);
  }

  function showPicker(teamIdx, t) {
    host.innerHTML = '';
    const head = el('div', {
      class: 'pop-team-head',
      style: `background: ${t.color}; color: white`
    });
    head.appendChild(el('span', { style: 'font-size: 22px' }, t.emoji));
    head.appendChild(el('span', { style: 'font-weight: 700; flex: 1' }, `${t.name} — kies een onderwerp`));
    const timerCh = el('span', { class: 'turn-timer slider-timer' }, '20s');
    head.appendChild(timerCh);
    host.appendChild(head);

    const grid = el('div', { class: 'pop-grid' });
    quiz.options.forEach((opt, i) => {
      const isTaken = Object.values(State.popAnswers).includes(i);
      const btn = el('button', {
        class: 'pop-option' + (isTaken ? ' picked' : ''),
        disabled: isTaken,
        onclick: () => {
          if (isTaken) return;
          State.popAnswers[teamIdx] = i;
          clearInterval(timer);
          turnIdx++;
          showCurtain();
        }
      });
      btn.appendChild(el('span', { class: 'pop-option-label' }, opt.label));
      if (isTaken) {
        // Don't show WHICH team — just generic "al gekozen"
        const tag = el('span', { class: 'pop-option-tag', style: 'background: #888' }, '🔒 al gekozen');
        btn.appendChild(tag);
      }
      grid.appendChild(btn);
    });
    host.appendChild(grid);

    // 20-second timer
    let timeLeft = 20;
    timer = setInterval(() => {
      timeLeft--;
      timerCh.textContent = `${timeLeft}s`;
      if (timeLeft <= 5) timerCh.classList.add('urgent');
      if (timeLeft <= 0) {
        clearInterval(timer);
        // Auto-pick: first available
        const available = quiz.options.findIndex((_, i) => !Object.values(State.popAnswers).includes(i));
        if (available >= 0) State.popAnswers[teamIdx] = available;
        turnIdx++;
        showCurtain();
      }
    }, 1000);
  }

  showCurtain();

  async function revealPopularity() {
    host.innerHTML = '';
    const loader = el('div', { class: 'pop-loader' });
    loader.appendChild(el('div', { class: 'pop-spinner' }));
    loader.appendChild(el('div', null, '🔌 Wikipedia pageviews ophalen — even geduld…'));
    host.appendChild(loader);

    // Fetch all in parallel
    const picks = Object.entries(State.popAnswers).map(([teamIdx, optIdx]) => ({
      teamIdx: +teamIdx,
      option: quiz.options[optIdx]
    }));
    const viewPromises = picks.map(p => fetchWikiViews(p.option.article));
    const views = await Promise.all(viewPromises);

    // If ALL failed (no internet), bail
    if (views.every(v => v === null)) {
      host.innerHTML = '';
      host.appendChild(el('div', { class: 'card', style: 'text-align:center; padding: 20px' },
        el('p', null, '⚠️ Geen verbinding met Wikipedia. Ronde wordt overgeslagen.')));
      setTimeout(() => moveAndContinue([]), 2200);
      return;
    }

    const results = picks.map((p, i) => ({
      teamIdx: p.teamIdx,
      team: State.teams[p.teamIdx],
      label: p.option.label,
      views: views[i] // may be null
    })).sort((a, b) => (b.views ?? -1) - (a.views ?? -1));

    // Award: +3 winner, +2 second, +1 third (skipping nulls)
    const valid = results.filter(r => r.views !== null);
    const moves = [];
    if (valid[0]) moves.push({ idx: valid[0].teamIdx, steps: 3 });
    if (valid[1]) moves.push({ idx: valid[1].teamIdx, steps: 2 });
    if (valid[2] && teamCount > 2) moves.push({ idx: valid[2].teamIdx, steps: 1 });

    let html = `<div style="font-size: 56px">🔥</div>
      <h2 class="display" style="font-size: 28px; margin: 8px 0 4px">${quiz.category}</h2>
      <p class="text-soft" style="margin-bottom: 14px">Wikipedia-bezoeken (afgelopen 30 dagen, NL Wikipedia)</p>
      <div style="margin-top: 8px; max-width: 600px; margin: 14px auto 0; text-align: left">`;
    results.forEach((r, i) => {
      const isWin = i === 0 && r.views !== null;
      const trophy = i === 0 ? '🏆 +3' : (i === 1 ? '🥈 +2' : (i === 2 && teamCount > 2 ? '🥉 +1' : ''));
      const viewsTxt = r.views === null ? 'geen data' : r.views.toLocaleString('nl-NL');
      html += `<div class="result-row ${isWin ? 'winner' : ''}">
        <span style="font-size: 22px">${r.team.emoji}</span>
        <div style="flex: 1; line-height: 1.3">
          <div style="font-weight: 700; color: ${r.team.color}">${r.team.name}</div>
          <div style="font-size: 13px; color: var(--ink-soft)">koos: ${r.label}</div>
        </div>
        <div style="text-align: right; min-width: 110px">
          <div style="font-variant-numeric: tabular-nums; font-weight: 700">${viewsTxt}</div>
          <div style="font-size: 11px; color: var(--ink-soft)">bezoeken</div>
        </div>
        <span style="font-weight: 700; min-width: 56px; text-align: right">${trophy}</span>
      </div>`;
    });
    html += `</div>
      <p class="hint" style="margin-top: 14px; font-size: 11px">Bron: Wikimedia REST Pageviews API (live)</p>`;
    showRoundResultAndContinue(html, moves);
  }
}

/* ============================ RANKING =============================== */
function renderRanking(stage) {
  const ranking = pickFresh(RANKINGS, "rank");
  const team = State.teams[State.currentTeamIndex];
  // The 'items' array is in correct order. Shuffle for presentation.
  const correctOrder = ranking.items.map(it => it.name);
  const shuffled = shuffle(correctOrder.slice());
  // Make sure shuffle isn't accidentally same as correct
  while (shuffled.every((s, i) => s === correctOrder[i])) shuffled.reverse();

  // User's ordering: array of indices into `shuffled` representing placement positions
  let clickOrder = [];
  let timer = null;

  stage.innerHTML = '';
  // Privacy curtain first
  const curtain = el('div', { class: 'privacy-curtain' });
  curtain.appendChild(el('div', { class: 'curtain-emoji' }, team.emoji));
  curtain.appendChild(el('div', { class: 'curtain-name', style: `color: ${team.color}` }, `${team.name}`));
  curtain.appendChild(el('div', { class: 'curtain-msg' }, `Klaar voor de ranglijst?`));
  curtain.appendChild(el('p', { class: 'hint', style: 'margin-top: 10px' }, `📊 ${ranking.category} — je krijgt 90 seconden`));
  curtain.appendChild(el('button', {
    class: 'btn btn-primary btn-large',
    onclick: () => { curtain.remove(); buildRanking(); }
  }, '📊 Start ranglijst'));
  stage.appendChild(curtain);

  function buildRanking() {
    // Team banner with timer
    const banner = el('div', { class: 'team-banner' });
    banner.appendChild(el('span', { class: 'team-banner-emoji' }, team.emoji));
    const txt = el('div', { class: 'team-banner-text' });
    txt.appendChild(document.createTextNode(`${team.name} • Ranglijst: ${ranking.category}`));
    txt.appendChild(el('small', null, `Klik in volgorde — elk juist geplaatste positie = +1 stap`));
    banner.appendChild(txt);
    const timerCh = el('span', { class: 'turn-timer rank-timer' }, '90s');
    banner.appendChild(timerCh);
    stage.appendChild(banner);

    const block = el('div', { class: 'question-block' });
    block.appendChild(el('p', { class: 'question-subtext' }, 'Rangschik van #1 (hoogst) naar #5 (laagst):'));
    block.appendChild(el('div', { class: 'question-text', style: 'font-size: 22px' }, `📊 ${ranking.criterion}`));
    stage.appendChild(block);

    // Two-column layout
    const wrap = el('div', { class: 'rank-wrap' });

    const optionsCol = el('div', { class: 'rank-options' });
    const slotsCol = el('div', { class: 'rank-slots' });
    slotsCol.appendChild(el('h4', { style: 'margin-bottom: 8px; color: var(--ink-soft); font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em' }, 'Jouw ranglijst'));

    function redraw() {
      optionsCol.innerHTML = '';
      optionsCol.appendChild(el('h4', { style: 'margin-bottom: 8px; color: var(--ink-soft); font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em' }, 'Beschikbaar'));
      shuffled.forEach((name, i) => {
        const placed = clickOrder.includes(i);
        const btn = el('button', {
          class: 'rank-option' + (placed ? ' placed' : ''),
          disabled: placed,
          onclick: () => {
            if (clickOrder.length >= 5) return;
            clickOrder.push(i);
            redraw();
          }
        }, name);
        optionsCol.appendChild(btn);
      });

      const slotsList = slotsCol.querySelector('.rank-slots-list') || el('div', { class: 'rank-slots-list' });
      slotsList.innerHTML = '';
      for (let pos = 0; pos < 5; pos++) {
        const slot = el('div', { class: 'rank-slot' });
        slot.appendChild(el('span', { class: 'rank-pos' }, `#${pos + 1}`));
        if (clickOrder[pos] !== undefined) {
          const name = shuffled[clickOrder[pos]];
          slot.appendChild(el('span', { class: 'rank-slot-name' }, name));
          slot.appendChild(el('button', {
            class: 'rank-slot-undo',
            onclick: () => {
              clickOrder = clickOrder.slice(0, pos);
              redraw();
            }
          }, '↺'));
        } else {
          slot.appendChild(el('span', { class: 'rank-slot-empty' }, '—'));
        }
        slotsList.appendChild(slot);
      }
      if (!slotsCol.querySelector('.rank-slots-list')) slotsCol.appendChild(slotsList);
    }
    redraw();

    wrap.appendChild(optionsCol);
    wrap.appendChild(slotsCol);
    stage.appendChild(wrap);

    // Submit
    function submitRanking() {
      if (timer) { clearInterval(timer); timer = null; }
      // Score: number of positions where user's pick equals correct
      const userOrder = clickOrder.map(i => shuffled[i]);
      let correctCount = 0;
      userOrder.forEach((name, pos) => {
        if (name === correctOrder[pos]) correctCount++;
      });

      let html = `<div style="font-size: 56px">${team.emoji}</div>
        <h2 class="display" style="font-size: 28px; margin: 8px 0 4px">${team.name} → ${correctCount}/5 juist</h2>
        <p class="text-soft" style="margin-bottom: 14px">${ranking.criterion}</p>
        <div style="margin-top: 12px; max-width: 580px; margin: 12px auto 0; text-align: left">`;
      correctOrder.forEach((name, pos) => {
        const userName = userOrder[pos];
        const isRight = userName === name;
        const item = ranking.items[pos];
        html += `<div class="result-row ${isRight ? 'winner' : ''}">
          <span style="font-weight: 700; font-size: 16px; min-width: 32px; color: var(--terracotta)">#${pos + 1}</span>
          <div style="flex: 1; line-height: 1.3">
            <div style="font-weight: 700">${name}</div>
            <div style="font-size: 12px; color: var(--ink-soft)">${item.value}</div>
          </div>
          <span style="font-weight: 600; font-size: 13px; color: ${isRight ? 'var(--green)' : 'var(--terracotta)'}; min-width: 110px; text-align: right">
            ${isRight ? '✓ jij ook' : (userName ? `jij: ${userName}` : 'leeg gelaten')}
          </span>
        </div>`;
      });
      html += `</div>
        <p style="margin-top: 14px; font-weight: 700; font-size: 18px">
          ${correctCount === 0 ? 'Helaas — geen stap.'
          : correctCount === 5 ? '🎉 Perfect! +5 stappen!'
          : `Goed bezig — +${correctCount} ${correctCount === 1 ? 'stap' : 'stappen'}.`}
        </p>`;
      const moves = correctCount > 0 ? [{ idx: State.currentTeamIndex, steps: correctCount }] : [];
      showRoundResultAndContinue(html, moves);
    }

    const submit = el('div', { class: 'text-center mt-4' });
    const submitBtn = el('button', {
      class: 'btn btn-primary btn-large',
      onclick: () => {
        if (clickOrder.length < 5) {
          // Allow early submit but warn
          if (!confirm('Je hebt nog niet alle posities gevuld. Toch indienen?')) return;
        }
        submitRanking();
      }
    }, '✅ Klaar — check de ranglijst');
    submit.appendChild(submitBtn);
    stage.appendChild(submit);

    // 90-second timer; auto-submit on expire
    let timeLeft = 90;
    timer = setInterval(() => {
      timeLeft--;
      timerCh.textContent = `${timeLeft}s`;
      if (timeLeft <= 10) timerCh.classList.add('urgent');
      if (timeLeft <= 0) {
        clearInterval(timer);
        submitRanking();
      }
    }, 1000);
  }
}

/* ========================== GAME OVER =============================== */
function showGameOver(winner) {
  State.screen = 'gameOver';
  const container = el('div', { class: 'winner-screen fade-in' });
  container.appendChild(el('div', { class: 'trophy-emoji' }, '🏆'));
  container.appendChild(el('div', { class: 'handwritten', style: 'font-size: 32px; color: var(--ink-soft); margin-bottom: 8px' }, 'En de winnaar is...'));
  container.appendChild(el('div', { class: 'winner-name pop-in' }, `${winner.emoji} ${winner.name}`));
  container.appendChild(el('p', { class: 'hint mt-4' }, `na ${State.roundNumber} ${State.roundNumber === 1 ? 'ronde' : 'rondes'} hard rennen door de woestijn`));

  // Final standings
  const standings = el('div', { class: 'card mt-6', style: 'max-width: 540px; margin: 24px auto 0; text-align: left' });
  standings.appendChild(el('h3', { style: 'text-align: center; margin-bottom: 12px' }, '🏁 Eindstand'));
  const sorted = State.teams.slice().sort((a, b) => b.position - a.position);
  sorted.forEach((t, i) => {
    const row = el('div', { class: 'result-row ' + (i === 0 ? 'winner' : '') });
    row.appendChild(el('span', { style: 'font-size: 22px; min-width: 24px' }, ['🥇','🥈','🥉','4','5','6','7','8'][i] || (i + 1)));
    row.appendChild(el('span', { style: 'font-size: 24px' }, t.emoji));
    row.appendChild(el('span', { style: `font-weight: 700; color: ${t.color}; flex: 1` }, t.name));
    row.appendChild(el('span', { style: 'font-weight: 700' }, `${t.position} stappen`));
    standings.appendChild(row);
  });
  container.appendChild(standings);

  const btnRow = el('div', { class: 'flex justify-center gap-3 mt-6', style: 'flex-wrap: wrap' });
  btnRow.appendChild(el('button', {
    class: 'btn btn-primary btn-large',
    onclick: () => {
      State.teams.forEach(t => t.position = 0);
      State.roundNumber = 0;
      State.history = [];
      State.roundQueue = buildRoundQueue();
      startNextRound();
    }
  }, '🔁 Nog een potje!'));
  btnRow.appendChild(el('button', {
    class: 'btn btn-secondary btn-large',
    onclick: () => { State.teams = []; renderSetup(); }
  }, '⚙️ Nieuwe setup'));
  container.appendChild(btnRow);

  render(container);

  // Confetti!
  if (window.confetti) {
    const duration = 3000;
    const end = Date.now() + duration;
    (function frame() {
      confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#C44536','#FFB627','#7FB069','#F4538A','#1B6F84'] });
      confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#C44536','#FFB627','#7FB069','#F4538A','#1B6F84'] });
      if (Date.now() < end) requestAnimationFrame(frame);
    })();
  }
}

/* =========================== INIT ================================== */
renderSetup();

</script>

</html>
